name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq and shellcheck
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq shellcheck

      - name: Lint shell scripts with shellcheck
        run: |
          shellcheck \
            skills/session-tab-namer/scripts/install.sh \
            skills/session-tab-namer/scripts/uninstall.sh \
            skills/session-tab-namer/scripts/session_start_hook.sh \
            tests/install_test.sh

      - name: Run hook smoke-test (make test)
        run: make test

      - name: Run installer integration test
        run: bash tests/install_test.sh
